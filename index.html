<!DOCTYPE html>
<html>
<head>
    <title>Live Text Viewer</title>
    <style>
        body {
            background: #111;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
        }

        #box {
            border: 1px solid #0f0;
            padding: 15px;
            min-height: 200px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h2>Received Data:</h2>

<!-- ✅ THIS WAS MISSING -->
<div id="box">Waiting...</div>

<script>
async function fetchData() {
    try {
        const res = await fetch('/data');
        const text = await res.text();
        document.getElementById('box').textContent = text;
    } catch (e) {
        document.getElementById('box').textContent = "Error";
    }
}

// Refresh every second
setInterval(fetchData, 1000);
fetchData();
</script>

</body>
</html>
