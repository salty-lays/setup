<!DOCTYPE html>
<html>
<head>
    <title>Live Cookie Log Viewer</title>

    <style>
        body {
            background: #111;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
        }

        #box {
            border: 1px solid #0f0;
            padding: 15px;
            height: 70vh;
            overflow-y: auto;
            user-select: text; /* ✅ allow copying */
        }

        .entry {
            border-bottom: 1px solid #0f0;
            padding: 10px 0;
        }

        .time {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }

        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            margin-bottom: 5px;
        }

        button:hover {
            background: #0c0;
        }
    </style>
</head>

<body>

<h2>Live Cookie Logs</h2>
<div id="box"></div>

<script>
const box = document.getElementById("box");

let lastData = "";
let isHovering = false;

// ✅ stop refresh when user interacting
box.addEventListener("mouseenter", () => isHovering = true);
box.addEventListener("mouseleave", () => isHovering = false);

function addLog(data) {

    const entry = document.createElement("div");
    entry.className = "entry";

    const time = new Date().toLocaleTimeString();

    const jsonText = JSON.stringify(data, null, 2);

    entry.innerHTML = `
        <div class="time">[${time}]</div>
        <button>Copy</button>
        <pre>${jsonText}</pre>
    `;

    // ✅ copy button logic
    entry.querySelector("button").onclick = () => {
        navigator.clipboard.writeText(jsonText);
        alert("Copied!");
    };

    box.appendChild(entry);
    box.scrollTop = box.scrollHeight;

    // ✅ auto remove after 10 min
    setTimeout(() => {
        entry.remove();
    }, 10 * 60 * 1000);
}

async function fetchData() {

    if (isHovering) return; // ✅ don't refresh while selecting

    try {
        const res = await fetch('/data');
        const data = await res.json();

        const serialized = JSON.stringify(data);

        if (serialized !== lastData) {
            lastData = serialized;
            addLog(data);
        }

    } catch (e) {
        console.error(e);
    }
}

setInterval(fetchData, 2000);
fetchData();
</script>

</body>
</html>
