<!DOCTYPE html>
<html>
<head>
    <title>Live Cookie Log Viewer</title>

    <style>
        body {
            background: #111;
            color: #0f0;
            font-family: monospace;
            padding: 20px;
        }

        #box {
            border: 1px solid #0f0;
            padding: 15px;
            height: 70vh;
            overflow-y: auto;
        }

        .entry {
            border-bottom: 1px solid #0f0;
            padding: 10px 0;
        }

        .time {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<h2>Live Cookie Logs</h2>
<div id="box"></div>

<script>
function addLog(data) {
    const box = document.getElementById("box");

    const entry = document.createElement("div");
    entry.className = "entry";

    const time = new Date().toLocaleTimeString();

    entry.innerHTML = `
        <div class="time">[${time}]</div>
        <div>${formatData(data)}</div>
    `;

    box.appendChild(entry);
    box.scrollTop = box.scrollHeight;

    setTimeout(() => {
        entry.remove();
    }, 10 * 60 * 1000);
}

// ✅ SHOW ALL COOKIES (name + value only)
function formatData(data) {
    if (!Array.isArray(data)) return "";

    return data
        .map(cookie => `
            <div style="margin-bottom:6px; border-bottom:1px solid #0f0; padding-bottom:4px;">
                <b>${cookie.name}</b>: ${cookie.value}
            </div>
        `)
        .join("");
}

let lastData = "";

async function fetchData() {
    try {
        const res = await fetch('/data');
        const data = await res.json();

        const serialized = JSON.stringify(data);

        if (serialized !== lastData) {
            lastData = serialized;
            addLog(data);
        }

    } catch (e) {
        console.error(e);
    }
}

setInterval(fetchData, 2000);
fetchData();
</script>

</body>
</html>
